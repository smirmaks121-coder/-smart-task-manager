<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/style.css">
    <title>Dream Manager</title>
</head>
<body>
    <div class="container">
        <!-- Прогресс -->
        <div class="card" style="text-align: center;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 800;">
                <span>Твой прогресс</span>
                <span>{{ progress }}%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progress-bar-fill" data-percent="{{ progress }}"></div></div>
            <a href="/export/word" class="btn-word" style="margin-top: 15px; display: inline-block; text-decoration: none;">💾 Экспорт в Word</a>
        </div>

        <!-- Форма -->
        <form action="/add" method="post" class="card add-form">
            <input type="text" name="title" placeholder="Что создадим?" required>
            <div style="display: flex; gap: 10px;">
                <input type="date" name="due_date" id="date-picker" style="flex: 2;">
                <select name="category" style="flex: 1;">
                    <option value="Работа">Работа</option>
                    <option value="Учеба">Учеба</option>
                    <option value="Дом">Дом</option>
                </select>
            </div>
            <button type="submit" class="btn-main">Создать задачу</button>
        </form>

        <!-- Задачи -->
        {% for task in tasks %}
        <div class="task-card {% if task.is_completed %}completed{% endif %}">
            <div style="display: flex; align-items: center; gap: 15px;">
                <form action="/toggle/{{ task.id }}" method="post">
                    <input type="checkbox" onchange="this.form.submit()" {% if task.is_completed %}checked{% endif %}>
                </form>
                <div>
                    <div class="badge">{{ task.category }}</div>
                    <div style="font-weight: 700;">{{ task.title }}</div>
                </div>
            </div>
            <form action="/delete/{{ task.id }}" method="post">
                <button type="submit" style="background: none; border: none; cursor: pointer;">🗑️</button>
            </form>
        </div>
        {% endfor %}

        <!-- Настройки -->
        <div class="card settings-panel">
            <div style="display: flex; gap: 10px;">
                <button onclick="setTheme('light')">☀️</button>
                <button onclick="setTheme('dark')" style="background: #000; color: #fff;">🌙</button>
            </div>
            <select onchange="setFontFamily(this.value)">
                <option value="system-ui">Modern</option>
                <option value="'Courier New', monospace">Retro</option>
                <option value="'Georgia', serif">Classic</option>
                <option value="'Verdana', sans-serif">Clean</option>
                <option value="'Impact', sans-serif">Bold</option>
                <option value="'Comic Sans MS', cursive">Comic</option>
            </select>
        </div>
    </div>
    <script src="/static/script.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const datePicker = document.getElementById('date-picker');
            if (datePicker) datePicker.valueAsDate = new Date();
            const fill = document.getElementById('progress-bar-fill');
            if (fill) {
                const percent = fill.getAttribute('data-percent');
                setTimeout(() => { fill.style.width = percent + "%"; }, 300);
            }
        });
    </script>
</body>
</html>
